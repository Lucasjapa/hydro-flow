services:
  postgres:
    image: postgres:15
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin
      - POSTGRES_DB=hf_management

    volumes:
      # Volume para garantir que os dados não sejam perdidos após o desligamento do container
      - ./data/postgres:/var/lib/postgresql/data

volumes:
  postgres_data:

